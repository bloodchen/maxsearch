<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 确保跨域只传域名，站内保留完整 -->
  <meta name="referrer" content="origin-when-cross-origin" />

  <!-- 提前预连接，减少握手耗时 -->
  <link rel="preconnect" href="https://cse.google.com" crossorigin>
  <link rel="preconnect" href="https://www.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">
  <link rel="dns-prefetch" href="https://www.googleadservices.com">

  <!-- 一次性自跳（在任何外部脚本前） -->
  <script>
    function logKey({ k, c, d }) {
      if (Math.random() >= 0.1) return
      let url = 'https://report.maxask.com/client/keyword'
      navigator.sendBeacon(url, JSON.stringify({ k, c, d, refer: document.referrer }));
    }
    (function () {
      var u = new URL(location.href);
      let channel_q = u.searchParams.get('q');
      if (channel_q) {
        const q1 = channel_q.replaceAll('+', ' ');
        var adultPattern = /(x{2,}|porn|porrno|sex|sexy|hentai|xnxx|xvideos|xhamster|pussi|dick|dicke|redtube|成人视频|成人|سكس|جنس|اباحي|ابباحية|صور\s*عارية|فيديو\s*سكس|सेक्स|अश्लील|पोर्न|नग्न)/iu;
        if (adultPattern.test(q1)) {
          logKey({
            c: 'adult--' + u.pathname,
            k: q1,
            d: u.host,
          })
          window.location.href = 'https://xxx.skyjem.com/v3/?q=' + q1;
          return
        }
      }
      if (u.searchParams.get('init') === '1') {
        u.searchParams.delete('init');
        location.replace(u.href); // 站内自跳 → Referer = 本页带 init 的地址
      }
    })();
  </script>

  <title>MaxAsk.com</title>

  <style>
    body {
      background-color: #fff;
    }

    .loading-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 260px);
    }

    .loading {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      /* 外圈 */
      border-top: 5px solid #3498db;
      /* 顶部颜色 */
      border-radius: 50%;
      animation: spin 2s linear infinite;
    }

    /* CSS3 动画 */
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* 自定义tab */
    .tabarea {
      display: flex;
      padding: 0 10px;
      border-bottom: 1px solid #e5e5e5;
      gap: 20px;
      position: relative;
    }

    .tabitem {
      display: block;
      padding: 10px 10px;
      min-width: 72px;
      color: #666;
      text-align: center;
      line-height: 1.5;
      border-radius: 2px;
    }

    .tabitem-inactive {
      transition: all 0.2s ease;
      border-color: transparent;
      color: #666;
      cursor: pointer;
    }


    .tabitem-inactive:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .tabitem-active {
      border-bottom: 4px solid #1a73e8;
      color: #1a73e8;
      border-radius: 2px;
      transition: all 0.2s ease;
      cursor: default;
    }

    .unfoldsearch {
      width: 32px;
      height: 32px;
      border-radius: 5px;
      background-image: url(/toggle.svg);
      display: block;
      background-repeat: no-repeat;
      background-position: center;
      top: 10px;
      right: 20px;
      position: absolute;
      transition: all 0.15s ease;
    }

    .unfoldsearch:hover {
      background-color: #00000010;
    }
  </style>
</head>

<body>
  <div class="cse-header cse-header-show" id="cse_header">
    <div id="glogo" width="156"></div>
    <div class="searchboxarea">
      <!-- 只保留一个 cse.js，避免在 <script>...内部注释 -->
      <script async src="https://cse.google.com/cse.js?cx=0c1d3e63e90b33ca3"></script>
      <!-- 绑定一个 gname，便于 JS 精确拿到该实例 -->
      <div class="gcse-searchbox" data-gname="s1"></div>
    </div>
    <a href='https://docs.google.com/forms/d/e/1FAIpQLSdDVPbRMdP2eIq4lFBIK4GY-8Gh7UhkSj0DOFplBI-BBdWxfA/viewform?usp=pp_url&entry.298115076=maxask.com/abc/'
      id='feedback' target="_blank" style="margin-left: 10px;">feedback</a>
  </div>

  <div class="tabarea" id="tabarea">
    <div class="tabitem tabitem-inactive" id="result_tab_0">Web</div>
    <div class="tabitem tabitem-inactive" id="result_tab_1">Image</div>
    <div class="tabitem tabitem-inactive" id="result_tab_2">AI Result</div>
    <div class="unfoldsearch" id="show_header"></div>
  </div>

  <div class="mainarea hide" id="googlesearh">
    <div class="loading-wrapper" id="gs_loading">
      <div class="loading"></div>
    </div>
    <!-- 和上面的 searchbox 用同一个 gname -->
    <div class="gcse-searchresults" data-gname="s1" style="flex:60%"></div>
    <div class="sidebar"></div>
  </div>

  <!-- 你的 AI 区域保留不变 -->
  <div class="aiarea hide" id="aiarea">
    <div class="hint hide" id="hint"> <!-- 提示框，显示添加show删除hide，隐藏添加hide，删除show-->
      <span class="hint-text">Tip: End your search with '?' for an instant AI query.</span>
      <span class="hint-close" id="hintClose">×</span>
    </div>
    <div class="aiwrapper" id="aiwrapper">
      <div class="loading-wrapper" id="ai_loading">
        <div class="loading"></div>
      </div>
      <iframe id="ai_iframe" class="aiframe" style="border: 0;" allow="clipboard-write">
      </iframe>
    </div>
  </div>

  <script>
    const emFeedback = document.getElementById('feedback');
    if (emFeedback)
      emFeedback.href = "https://docs.google.com/forms/d/e/1FAIpQLSdDVPbRMdP2eIq4lFBIK4GY-8Gh7UhkSj0DOFplBI-BBdWxfA/viewform?usp=pp_url&entry.298115076=" + window.location.href;

    // 安全地挂好回调，避免元素未就绪时报错
    window.__gcse = window.__gcse || {};
    window.__gcse.searchCallbacks = {
      image: { rendered: makenicer },
      web: { rendered: makenicer, ready: myResultsReadyCallback },
    };
    function logKey({ k, c, d }) {
      if (Math.random() >= 0.1) return
      let url = `https://report.maxask.com/client/keyword?k=${k}&c=${c}&d=${d}&refer=${document.referrer}`
      fetch(url)
    }
    function makenicer() {
      try {
        const url = new URL(document.location.href);
        const qhash = url.hash.split("gsc.q");
        if (qhash[1]) {
          let c = decodeURIComponent(qhash[1].slice(1));
          let a = c.split('&')[0];
          if (a) {
            document.title = a + " - Search Result";
            logKey({ c: url.pathname, k: a, d: url.hostname || url.host });
          }
        }
      } catch (_) { }
    }
    function myResultsReadyCallback() {
      var l = document.getElementById('gs_loading');
      if (l) l.style.display = 'none';
    }
  </script>

  <script>
    // —— 工具函数 —— //
    function setCookie(name, value, days) {
      const date = new Date();
      date.setTime(date.getTime() + (days * 864e5));
      document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + date.toUTCString() + "; path=/; SameSite=Lax";
    }
    function getCookie(name) {
      const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\\\/\+^])/g, '\\$1') + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : undefined;
    }
    function getParam(param) { return new URLSearchParams(window.location.search).get(param); }
    function getHashParamValue(paramName) {
      const params = new URLSearchParams(location.hash.slice(1));
      return params.get(paramName);
    }
    function setHashParamValue(paramName, paramValue) {
      const params = new URLSearchParams(location.hash.slice(1));
      if (paramValue == null) params.delete(paramName); else params.set(paramName, paramValue);
      const newHash = params.toString();
      if (location.hash.slice(1) !== newHash) location.hash = '#' + newHash;
    }

    // —— 选项卡/显示逻辑（与你现有一致，略微稳健化） —— //
    var tabid = getHashParamValue('gsc.tab');
    var ai_q = getHashParamValue('gsc.q');
    var channel_q = getParam('q');
    var isShowedHint = getCookie('isShowedHint');
    var showHeader = false;
    var old_ai_q = '';
    const aiiframe = document.getElementById('ai_iframe');

    if (!isShowedHint) {
      const hint = document.getElementById('hint');
      if (hint) { hint.classList.remove('hide'); hint.classList.add('show'); }
    }

    // 关键增强：用 ?q= 同步驱动 CSE（避免只靠 hash）
    // 如果 URL 上带了 ?q=，把它同步进 hash，并执行 CSE 查询
    (function bootstrapQueryFromSearchParam() {
      if (channel_q) {
        if (!ai_q) setHashParamValue('gsc.q', channel_q);
        // CSE 实例准备好后执行查询
        const tryExec = () => {
          try {
            const el = google?.search?.cse?.element?.getElement('s1'); // 用我们自定义的 gname
            if (el) { el.execute(channel_q); return; }
          } catch (_) { }
          setTimeout(tryExec, 120);
        };
        tryExec();
      }
    })();

    // 判断是否直接进 AI
    if (!ai_q && channel_q) ai_q = channel_q;
    if (ai_q && (ai_q.endsWith('?') || ai_q.endsWith('？'))) tabid = 2;

    // 根据之前决定的tabid，显示对应页面
    if (tabid == 2) {
      showAISearch(ai_q);
    } else {
      showGoogleResult(tabid);
    }

    function showTab(showtabid) {
      showtabid = (showtabid == null) ? 0 : showtabid;
      for (let i = 0; i < 3; i++) {
        const el = document.getElementById('result_tab_' + i);
        if (!el) continue;
        el.classList.add('tabitem-inactive');
        el.classList.remove('tabitem-active');
      }
      const cur = document.getElementById('result_tab_' + showtabid);
      if (cur) { cur.classList.remove('tabitem-inactive'); cur.classList.add('tabitem-active'); }
      tabid = showtabid;
      setHashParamValue('gsc.tab', tabid);
    }

    function showGoogleResult(tid) {
      showTab(tid);
      const ch = document.getElementById('cse_header');
      if (ch) { ch.classList.remove('cse-header-hide'); ch.classList.add('cse-header-show'); }
      document.getElementById('aiarea')?.classList.add('hide');
      document.getElementById('googlesearh')?.classList.remove('hide');
      document.getElementById('show_header')?.classList.add('hide');
      showHeader = true;
    }

    function showAISearch(ai_q_now) {
      showTab(2);
      const ch = document.getElementById('cse_header');
      document.getElementById('googlesearh')?.classList.add('hide');
      document.getElementById('aiarea')?.classList.remove('hide');
      if (ch) { ch.classList.add('cse-header-hide'); ch.classList.remove('cse-header-show'); }
      document.getElementById('show_header')?.classList.remove('hide');
      showHeader = false; handleResize();

      if (aiiframe) {
        if (!aiiframe.src) {
          aiiframe.src = ai_q_now ? `https://uugpt.com/framed/?aisearch_q=${encodeURIComponent(ai_q_now)}`
            : `https://uugpt.com/framed/`;
          old_ai_q = ai_q_now || '';
        } else if (ai_q_now && ai_q_now !== old_ai_q) {
          aiiframe.contentWindow.postMessage(ai_q_now, '*');
          old_ai_q = ai_q_now;
        }
      }
    }

    function back2Search() { if (tabid == 2) showGoogleResult(0); }

    function handleResize() {
      let viewHight = document.documentElement.clientHeight;
      const w = document.getElementById('aiwrapper');
      if (w) w.style.height = (viewHight - (showHeader ? 165 : 75)) + 'px';
    }

    // —— 事件绑定 —— //
    window.addEventListener('resize', handleResize);
    document.getElementById('result_tab_0')?.addEventListener('click', () => showGoogleResult(0));
    document.getElementById('result_tab_1')?.addEventListener('click', () => showGoogleResult(1));
    document.getElementById('result_tab_2')?.addEventListener('click', () => { ai_q = getHashParamValue('gsc.q'); showAISearch(ai_q); });

    document.getElementById('show_header')?.addEventListener('click', () => {
      let ch = document.getElementById('cse_header');
      let btn = document.getElementById('show_header');
      if (!ch || !btn) return;
      if (!showHeader) {
        ch.classList.remove('cse-header-hide'); ch.classList.add('cse-header-show');
        showHeader = true; handleResize(); btn.classList.add('rotate-180');
      } else {
        ch.classList.add('cse-header-hide'); ch.classList.remove('cse-header-show');
        showHeader = false; handleResize(); btn.classList.remove('rotate-180');
      }
    });

    document.getElementById('hintClose')?.addEventListener('click', () => {
      const hint = document.getElementById('hint');
      if (hint) { hint.classList.remove('show'); hint.classList.add('hide'); }
      setCookie('isShowedHint', '1', 365);
    });

    // 等待 CSE DOM 注入后再绑定搜索框事件（避免取不到元素）
    window.addEventListener('load', () => {
      // 这两个选择器可能因 CSE 版本变动而变化，做保护
      const btn = document.querySelector('.gsc-search-button.gsc-search-button-v2');
      const input = document.getElementById('gsc-i-id1') || document.querySelector('input.gsc-input');

      if (btn) btn.addEventListener('click', back2Search);
      if (input) {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.keyCode === 13) {
            ai_q = input.value || '';
            setHashParamValue('gsc.q', ai_q);
            if (ai_q && (/[？?]$/.test(ai_q))) showAISearch(ai_q);
            else back2Search();
          }
        });
        input.addEventListener('input', (e) => { ai_q = e.target.value; });
      }

      const l = document.getElementById('gs_loading');
      if (l) l.style.display = 'none';
      handleResize();
    });

    // AI iframe load 回调（保持）
    document.getElementById('ai_iframe').onload = function () {
      document.getElementById('ai_loading')?.style?.setProperty('display', 'none');
    };
  </script>

  <script src="https://www.gstatic.com/prose/brand.js" targetId="glogo"></script>
  <link rel="stylesheet" href="/pretty.css" />
</body>

</html>
