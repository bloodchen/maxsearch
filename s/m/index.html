<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
</head>

<body>
    <script>
        // Get 'q' parameter from URL
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');

        if (q) {
            // Redirect to the target URL with the q parameter
            const redirectUrl = `https://iksrchrdr.com/ecrp/?gd=RD1005796&searchsource=200&q=${encodeURIComponent(q)}`;
            window.location.href = redirectUrl;
        } else {
            document.body.textContent = 'No search query provided.';
        }
    </script>
</body>

</html>
